run_name_prefix: churn

data:
  raw_data_path: data/raw/churn_customers.csv
  artifact_root: artifacts
  tracking_path: tracking/runs.jsonl
  report_path: reports/latest_evaluation.md
  train_fraction: 0.7
  validation_fraction: 0.15
  test_fraction: 0.15
  random_state: 42

validation:
  target_column: churned
  entity_id_column: customer_id
  max_missing_fraction: 0.2
  min_rows: 500
  positive_class_min_rate: 0.05
  positive_class_max_rate: 0.7

model:
  numeric_features:
    - age
    - tenure_months
    - monthly_charges
    - total_charges
    - support_tickets_90d
    - avg_weekly_logins
    - late_payments_12m
  categorical_features:
    - geography
    - gender
    - contract_type
    - payment_method
  boolean_features:
    - paperless_billing
    - has_internet_service
    - has_phone_service
    - is_premium_plan
  logistic_regression:
    C: 1.0
    max_iter: 400
    class_weight: balanced

training:
  experiment_name: churn-prediction
  registered_model_name: churn_prediction_model
  selection_metric: roc_auc
  retrain_rounds: 3
  log_model_candidates: true
  candidate_models:
    - name: logistic_c_0_5
      estimator: logistic_regression
      params:
        C: 0.5
        max_iter: 400
        class_weight: balanced
    - name: logistic_c_1_0
      estimator: logistic_regression
      params:
        C: 1.0
        max_iter: 400
        class_weight: balanced
    - name: logistic_c_3_0
      estimator: logistic_regression
      params:
        C: 3.0
        max_iter: 500
        class_weight: balanced
    - name: random_forest_200
      estimator: random_forest
      params:
        n_estimators: 200
        max_depth: 10
        min_samples_leaf: 2
        class_weight: balanced_subsample
        n_jobs: -1
    - name: extra_trees_300
      estimator: extra_trees
      params:
        n_estimators: 300
        max_depth: 12
        min_samples_leaf: 2
        class_weight: balanced
        n_jobs: -1

mlflow:
  enabled: true
  tracking_uri: mlruns

thresholding:
  min_precision: 0.30
  min_recall: 0.30

metrics:
  min_roc_auc: 0.79
  min_average_precision: 0.35
  min_f1: 0.38
  min_recall: 0.35

packaging:
  sample_payload_rows: 3
